<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reserva creada - Gourmet</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/reservar-ok.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script th:src="@{/js/navbar.js}" defer></script>
</head>
<body>

<div th:replace="fragments/navbar :: navbar(${false})"></div>

<main class="confirm-page">
    <section class="confirm-card">
        <div class="icon-wrapper">
            <i class="bi bi-check2-circle"></i>
        </div>
        <h2>¡Reserva creada!</h2>
        <p th:text="${mensaje}">Tu reserva ha sido registrada con éxito.</p>

        <a th:href="@{/mis-reservas}" class="btn-primary">
            Ver mis reservas
        </a>
        <a th:href="@{/}" class="btn-link">
            Volver al inicio
        </a>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
