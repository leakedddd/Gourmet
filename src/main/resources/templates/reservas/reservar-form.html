<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reservar - Gourmet</title>
    <link rel="stylesheet" th:href="@{/css/reservar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script th:src="@{/js/navbar.js}" defer></script>
    <script th:src="@{/js/reservar.js}" defer></script>
</head>
<body>

<div th:replace="fragments/navbar :: navbar(${false})"></div>

<main class="reserva-page">
    <form th:action="@{/reservar}"
          th:object="${reservaDto}"
          method="post"
          id="formReserva"
          class="reserva-card">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <!-- Error backend -->
        <div th:if="${error}" class="error-box" th:text="${error}"></div>

        <!-- 1. Cantidad de personas -->
        <section class="block">
            <h2>Elige la cantidad de personas</h2>
            <div class="line"></div>

            <div class="people-selector" id="peopleSelector">
                <button type="button" class="people-btn" data-value="1">1</button>
                <button type="button" class="people-btn" data-value="2">2</button>
                <button type="button" class="people-btn" data-value="3">3</button>
                <button type="button" class="people-btn" data-value="4">4</button>
                <button type="button" class="people-btn" data-value="5">5</button>
                <button type="button" class="people-btn" data-value="6">6</button>
                <button type="button" class="people-btn" data-value="7">7</button>
                <button type="button" class="people-btn" data-value="8">8</button>
            </div>

            <input type="hidden" th:field="*{personas}" id="cantidadPersonas" required>
        </section>

        <!-- 2. Fecha -->
        <section class="block">
            <h2>Selecciona una fecha</h2>
            <div class="line"></div>

            <div class="calendar-shell">
                <div class="calendar-header">
                    <button type="button" class="cal-nav" id="calPrev">&lt;</button>
                    <h3 id="calTitle">Mes</h3>
                    <button type="button" class="cal-nav" id="calNext">&gt;</button>
                </div>

                <div class="weekdays big">
                    <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
                </div>

                <div class="days big" id="calDays"></div>

                <script th:inline="javascript">
                    /*<![CDATA[*/
                    const MESES_DATA = /*[[${meses}]]*/ [];
                    /*]]>*/
                </script>
            </div>

            <input type="hidden" th:field="*{fecha}" id="fecha" required>
        </section>

        <section class="block">
                <h2>Elige una hora</h2>
                <div class="line"></div>

                <div class="hours-grid" id="hoursGrid">
                    <button type="button" class="hour-btn" data-value="13:00">1:00 PM</button>
                    <button type="button" class="hour-btn" data-value="13:15">1:15 PM</button>
                    <button type="button" class="hour-btn" data-value="13:30">1:30 PM</button>

                    <button type="button" class="hour-btn" data-value="13:45">1:45 PM</button>
                    <button type="button" class="hour-btn" data-value="14:00">2:00 PM</button>
                    <button type="button" class="hour-btn" data-value="14:15">2:15 PM</button>

                    <button type="button" class="hour-btn" data-value="14:30">2:30 PM</button>
                    <button type="button" class="hour-btn" data-value="14:45">2:45 PM</button>
                    <button type="button" class="hour-btn" data-value="15:00">3:00 PM</button>

                    <button type="button" class="hour-btn" data-value="15:15">3:15 PM</button>
                    <button type="button" class="hour-btn" data-value="15:30">3:30 PM</button>
                    <button type="button" class="hour-btn" data-value="16:00">4:00 PM</button>

                    <button type="button" class="hour-btn" data-value="16:30">4:30 PM</button>
                    <button type="button" class="hour-btn" data-value="19:00">7:00 PM</button>
                    <button type="button" class="hour-btn" data-value="19:15">7:15 PM</button>

                    <button type="button" class="hour-btn" data-value="19:30">7:30 PM</button>
                    <button type="button" class="hour-btn" data-value="19:45">7:45 PM</button>
                    <button type="button" class="hour-btn" data-value="20:00">8:00 PM</button>

                    <button type="button" class="hour-btn" data-value="20:15">8:15 PM</button>
                    <button type="button" class="hour-btn" data-value="20:30">8:30 PM</button>
                    <button type="button" class="hour-btn" data-value="21:30">9:30 PM</button>
                </div>
            <input type="hidden" th:field="*{hora}" id="hora" required>
        </section>

        <!-- 4. Observaciones -->
        <section class="block">
            <h2>Observaciones</h2>
            <div class="line"></div>
            <div class="obs-wrapper">
            <textarea th:field="*{observaciones}"
                      rows="3"
                      placeholder="¿Algo que debamos saber? (alergias, celebración, etc.)"></textarea>
            </div>
        </section>

        <!-- 5. Botón -->
        <div class="actions-submit">
            <button type="submit" class="btn-primary">Confirmar reserva</button>
        </div>
    </form>

</main>

<div th:replace="fragments/footer :: footer"></div>

<!-- Modal de validación -->
<div id="modalValidacion" class="g-modal-overlay" style="display:none;">
    <div class="g-modal">
        <div class="g-modal-header">
            <div class="g-modal-icon">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </div>
            <div class="g-modal-title">
                <h3>Falta completar</h3>
                <p id="modalValidacionMsg">Completa los datos requeridos.</p>
            </div>

            <button type="button" class="g-modal-close" onclick="cerrarModalValidacion()">×</button>
        </div>

        <div class="g-modal-body">
            <ul id="modalValidacionLista" class="g-modal-list"></ul>
        </div>

        <div class="g-modal-footer">
            <button type="button" class="g-btn-secondary" onclick="cerrarModalValidacion()">Entendido</button>
        </div>
    </div>
</div>

</body>
</html>
