<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Iniciar sesión - Gourmet</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">    
    <script th:src="@{/js/navbar.js}" defer></script>
</head>
<body>

<div th:replace="fragments/navbar :: navbar(${false})"></div>

<main class="auth-page">
    <section class="auth-card">
        <div class="auth-icon">
            <i class="bi bi-person-fill"></i>
        </div>
        <h2>Bienvenido</h2>
        <p class="auth-subtitle">Inicia sesión para gestionar tus reservas.</p>

        <div th:if="${param.error}" class="alert-msg alert-error">
            <i class="bi bi-x-circle-fill"></i>
            <span>Correo o clave incorrectos.</span>
        </div>

        <div th:if="${param.logout}" class="alert-msg alert-info">
            <i class="bi bi-box-arrow-right"></i>
            <span>Sesión cerrada correctamente.</span>
        </div>

        <div th:if="${param.registered}" class="alert-msg alert-success">
            <i class="bi bi-check-circle-fill"></i>
            <span>Cuenta creada. Ahora inicia sesión.</span>
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label for="correo">Correo</label>
                <div class="input-shell">
                    <i class="bi bi-envelope"></i>
                    <input id="correo" type="email" name="correo" required placeholder="tu@correo.com">
                </div>
            </div>

            <div class="form-group">
                <label for="clave">Clave</label>
                <div class="input-shell">
                    <i class="bi bi-lock"></i>
                    <input id="clave" type="password" name="clave" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn-primary">Entrar</button>

            <p class="register-text">
                ¿No tienes cuenta?
                <a th:href="@{/register}">Regístrate</a>.
            </p>

        </form>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
